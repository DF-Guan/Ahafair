  <!-- 内部光泽 -->
  <rect x="40" y="40" width="120" height="60" rx="28" fill="white" fill-opacity="0.05"/>

  <!-- 字母 A -->
  <path d="M100 65 L78 130 H92 L97 115 H103 L108 130 H122 L100 65 Z M97 105 L100 92 L103 105 H97 Z" fill="#E8E8EC"/>
</svg>
